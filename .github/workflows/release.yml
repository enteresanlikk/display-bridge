name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: cd servers/macos && swift build -c release

      - name: Ad-hoc code sign
        run: |
          codesign --force --sign - servers/macos/.build/release/DisplayBridgeCLI
          codesign --force --sign - servers/macos/.build/release/DisplayBridgeApp

      - name: Package artifacts
        run: |
          cd servers/macos/.build/release
          xattr -cr DisplayBridgeCLI DisplayBridgeApp
          zip -j DisplayBridge-macOS.zip DisplayBridgeCLI DisplayBridgeApp

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: servers/macos/.build/release/DisplayBridge-macOS.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build APK
        run: cd clients/android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Find and rename APK
        run: |
          apk=$(find clients/android -name '*.apk' -path '*/release/*' | head -1)
          cp "$apk" DisplayBridge-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: DisplayBridge-Android.apk

  release:
    needs: [build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-build

      - uses: actions/download-artifact@v4
        with:
          name: android-build

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            DisplayBridge-macOS.zip
            DisplayBridge-Android.apk
          generate_release_notes: true
